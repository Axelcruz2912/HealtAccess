spring.application.name=HealtAccess

# Application
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_farmacia?useSSL=false&serverTimezone=America/Mexico_City
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=tuClaveSecretaParaJWTDeAlMenos32CaracteresSegura
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Security
security.max-login-attempts=5
security.login-lock-duration=15

# Session
server.servlet.session.timeout=30m

# Logging
logging.level.axel.utvt.farmacia=DEBUG
logging.file.name=logs/farmacia.log

# Alert thresholds
alerts.failed-login-threshold=3
alerts.unusual-hours-start=22
alerts.unusual-hours-end=6

# Archivos est·ticos
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/**